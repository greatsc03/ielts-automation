name: Daily IELTS Reading Sender

on:
  schedule:
    # 매일 한국 시간 아침 7시 (UTC 22:00) 에 실행 (월~금요일만).
    # 한국의 월~금 오전 7시는 UTC 기준 일~목 오후 10시(22:00)입니다 (cron의 0-4)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    # 수동으로 테스트 실행할 수 있도록 허용합니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          python main.py
